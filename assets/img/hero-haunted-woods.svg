      <ellipse cx="615" cy="188" rx="7" ry="9" fill="#000"/><ellipse cx="637" cy="188" rx="7" ry="9" fill="#000"/>
      <path d="M626 198 l-4 10 8 0z" fill="#000"/>
      <rect x="623" y="232" width="6" height="120" rx="3"/>
      <g stroke="#000" stroke-width="3" fill="none">
