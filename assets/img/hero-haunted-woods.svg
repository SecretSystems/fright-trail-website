         l16 0 0 -34 14 0 0 34 18 0 0 -34 14 0 0 34 18 0 0 -34 14 0 0 34 16 0
         c19 0 32 -11 32 -28 l0 -36 c0 -15 4 -24 14 -33 c25 -22 45 -58 45 -108 c0 -94 -58 -158 -150 -158z"/>
    <path d="M236 250 q34 40 70 44 q-30 30 -78 18 q-6 -36 8 -62z" fill="#000" opacity="0.32"/>
