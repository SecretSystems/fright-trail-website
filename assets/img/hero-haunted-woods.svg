    <path d="M300 360 q40 22 80 0 q-6 26 -40 26 q-34 0 -40 -26z" fill="#000" opacity="0.45"/>
    <path d="M250 210 c0 -30 26 -44 54 -40 c18 3 26 18 22 40 c-5 28 -28 46 -52 42 c-20 -3 -24 -22 -24 -42z" fill="url(#socket)"/>
    <path d="M430 210 c0 -30 -26 -44 -54 -40 c-18 3 -26 18 -22 40 c5 28 28 46 52 42 c20 -3 24 -22 24 -42z" fill="url(#socket)"/>
    <path d="M340 250 l-22 70 q22 16 44 0z" fill="#000"/>
