    <ellipse cx="392" cy="222" rx="42" ry="34" fill="url(#eyeGlow)" opacity="0.9"/>
    <circle cx="292" cy="220" r="9" fill="#fff"/><circle cx="390" cy="220" r="9" fill="#fff"/>
  </g>

  <g filter="url(#roughHeavy)">
    <g fill="url(#boneShade)" stroke="#000" stroke-width="2.2" stroke-linejoin="round">
      <path d="M300 560 c-14 -40 -10 -78 6 -96 c14 -16 40 -14 50 6 c8 16 8 40 4 70 z"/>
      <path d="M300 470 c-10 -46 -6 -92 2 -120 c3 -10 16 -10 18 1 c4 30 4 78 0 120 z"/>
      <path d="M322 462 c-6 -52 -4 -110 2 -146 c2 -11 16 -11 18 0 c5 36 5 96 0 148 z"/>
      <path d="M346 462 c-4 -50 -2 -104 4 -138 c2 -11 16 -10 17 1 c4 34 4 88 -1 140 z"/>
      <path d="M368 470 c0 -42 4 -86 10 -112 c3 -11 16 -9 16 2 c1 28 -2 74 -8 114 z"/>
